<!-- index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Portfolio|Bindu Shree S</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="css/custom.css">

</head>

<body>

    <div id="scroll-progress" class="fixed top-0 left-0 h-1 bg-blue-500 z-50 w-0"></div>

    <!-- HERO SECTION -->

    <section class="min-h-screen flex flex-col lg:flex-row lg:items-center lg:justify-between px-8 lg:px-16 py-20 gap-12 lg:gap-20">

        <div class="order-2 lg:order-1 flex-1 lg:max-w-lg text-center lg:text-left">
            <p id="greeting" class="text-lg font-semibold text-blue-500 mb-2"></p>
            <p id="location-msg" class="text-sm text-gray-500 mb-2"></p>
            <h1 id="Myname" class="text-5xl mb-6">Bindu Shree S</h1>

            <p id="typing-text" class="text-xl lg:text-2xl text-slate-600 font-bold mb-10 max-w-md mx-auto lg:mx-0"></p>

            <div
                class="flex flex-col sm:flex-row gap-4 justify-center lg:justify-start items-center lg:items-start mb-8">

                <a href="#projects" class="bg-red-400 hover:bg-green-500 px-10 py-4 rounded shadow-xl">
                    View Projects
                </a>

            </div>
            <div
                class="flex flex-col sm:flex-row gap-4 justify-center lg:justify-start items-center lg:items-start mb-8">

                <a href="https://github.com/bindushrees-web" target="_blank" class="bg-red-400 hover:bg-green-500 px-10 py-4 rounded shadow-xl">
                    Github
                </a>

            </div>

            <div class="flex flex-wrap gap-6 justify-center lg:justify-start text-sm font-bold">

                <span>200+ Github commits</span>
                <span>2 live projects completed</span>

            </div>

        </div>

        <div class="order-1 lg:order-2 w-full lg:w-96 max-w-sm mx-auto lg:mx-0">

            <img src="myphoto.jpg" alt="My photo"
                class="aspect-square w-full rounded-full shadow-lg mx-auto lg:mx-0 hover:ring-blue-500 transition-all duration-300 hover:scale-[1.02]"
                loading="lazy">

        </div>

    </section>

    <!-- NAVBAR -->
    <nav class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b shadow-lg">

        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

            <a href="#"
                class="text-2xl font-bold bg-clip-text bg-gradient-to-r from-red-400 to-slate-700 text-transparent">
                BSS
            </a>

            <ul class="hidden md:flex items-center gap-10">

                <li><a href="#projects" class="nav-link">Projects</a></li>

                <li><a href="#experience" class="nav-link">Experience</a></li>

                <li><a href="#skills" class="nav-link">Skills</a></li>
                            
            </ul>
            <button id="theme-toggle" class="bg-red-400 px-4 py-2 rounded font-bold">Theme</button>
            <button id="nav-contact-btn" class="bg-red-400 hover:bg-green-500 rounded transition-all duration-300 px-8 py-3"> Let's talk </button>

        </div>

    </nav>

    <!-- PROJECTS -->

    <section id="projects" class="py-24 px-8 lg:px-16">

        <div class="max-w-7xl mx-auto">

            <div class="text-center mb-10">

                <h2 id="project-name" class="text-4xl lg:text-5xl mb-6">My Projects</h2>

                <p class="text-xl max-w-2xl mx-auto">
                    Enterprise scale full-stack applications built with modern frameworks
                </p>

            </div>

            <!-- Project Search (Feature will attach here) -->

            <div class="mb-10 text-center">

                <input id="project-search" type="text" placeholder="Search projects..."
                    class="border rounded px-6 py-3 w-full max-w-md">

            </div>

            <p id="project-count" class="text-center text-sm text-gray-600 mt-2"></p>
            
            <!-- Project Filter Bar -->

           <div id="project-filters" class="flex flex-wrap justify-center gap-4 mb-12">

                <button class="filter-btn bg-blue-500 text-white px-4 py-2 rounded" data-category="Frontend">Frontend</button>

                <button class="filter-btn px-4 py-2 rounded border" data-category="Backend">Backend</button>

                <button class="filter-btn px-4 py-2 rounded border" data-category="Full Stack">AI</button>

                <button class="filter-btn px-4 py-2 rounded border" data-category="AI">AI</button>

            </div>

            <!-- Dynamic container for projects -->

            <div id="projects-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>

        </div>

    </section>

    <!-- EXPERIENCE -->

    <section id="experience" class="py-24 px-8 lg:px-16">

        <div class="max-w-4xl mx-auto">

            <h2 id="education-experience" class="text-4xl font-bold text-gray-700 text-center mb-20">
                Education and Experience
            </h2>

            <!-- existing experience cards remain unchanged -->  

        </div>
    </section>

    <!-- SKILLS -->

    <section id="skills" class="py-24 px-8 lg:px-16 bg-gray-100">
        <div class="max-w-7xl mx-auto">

            <h2 id="skill" class="text-4xl text-center font-bold mb-20">
                Skills
            </h2>

            <!-- Dynamic Skills Container -->

            <div id="skills-container" class="flex justify-center">
            </div>

        </div>

    </section>

    <!-- CONTACT MODAL -->

    <button id="modal-trigger"
        class="fixed bottom-8 right-8 w-16 h-16 bg-blue-900 text-white rounded-full shadow-2xl flex items-center justify-center text-2xl font-bold">
        ☏
    </button>

    <div id="contact-modal" class="fixed inset-0 z-50 hidden bg-black/50 backdrop-blur-md">

        <div class="flex items-center justify-center min-h-screen p-4">

            <div id="modal-content"
                class="bg-white w-full max-w-md rounded-2xl shadow-2xl scale-95 opacity-0 transition-all duration-300">

                <div class="sticky top-0 border-b p-8 pt-12 bg-white">

                    <h3 class="text-2xl font-bold">Contact Me</h3>

                    <button id="modal-close" class="absolute top-6 right-6 text-2xl font-bold">
                        ×
                    </button>

                </div>

                <form id="contact-form" class="p-8 space-y-4">

                    <input id="contact-name" type="text" placeholder="Your name"
                        class="w-full border rounded px-4 py-3">

                    <input id="contact-email" type="email" placeholder="email@website.com"
                        class="w-full border rounded px-4 py-3">

                    <p id="form-message" class="text-sm text-red-500"></p>

                    <div class="flex flex-col sm:flex-row gap-4 pt-4">

                        <button type="button" id="form-cancel" class="flex-1 font-bold py-4 px-6">
                            Cancel
                        </button>

                        <button type="submit" class="flex-1 font-bold py-4 px-6">
                            Submit
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

    <button id="back-to-top"
        class="fixed bottom-24 right-6 bg-blue-900 text-white px-6 py-4 rounded-full shadow-lg hidden transition-all duration-300">↑ Top
    </button>

    <!-- MAIN JS ENTRY -->
    <script src="js/data/education.js"></script>
    <script src="js/features/education-render.js"></script>
    <script src="js/data/projects.js"></script>
    <script src="js/data/skills.js"></script>
    <script src="js/features/skills-render.js"></script>
    <script src="js/features/modal.js"></script>
    <script src="js/features/contact-validation.js"></script>
    <script src="js/features/theme-toggle.js"></script>
    <script src="js/features/project-render.js"></script>
    <script src="js/features/scroll-progress.js"></script>
    <script src="js/features/scroll-spy.js"></script>
    <script src="js/features/back-to-top.js"></script>
    <script src="js/features/project-search.js"></script>
    <script src="js/features/project-filter.js"></script>
    <script src="js/features/typing-animation.js"></script>
    <script src="js/features/greeting.js"></script>
    <script src="js/features/geolocation.js"></script>
    <script src="js/main.js"></script>

</body>

</html>
